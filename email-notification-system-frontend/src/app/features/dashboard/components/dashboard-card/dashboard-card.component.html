<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
            <i class=" text-blue-500 text-xl"
            [class]="card.icon"></i>
        </div>
        <span class="text-sm font-medium text-green-600 bg-green-100 px-2 py-1 rounded"
        [ngClass]="[trend().textColor, trend().background]"
        >+12.5%</span>
    </div>
    <h3 class="text-2xl font-bold text-gray-800">{{ card.value }}</h3>
    <p class="text-gray-500 text-sm">{{ card.label }}</p>
</div>
