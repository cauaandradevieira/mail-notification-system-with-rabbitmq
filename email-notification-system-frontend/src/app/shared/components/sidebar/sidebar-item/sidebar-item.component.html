<a (click)="onClicked()" class="cursor-pointer">
    <div class="flex items-center justify-start text-gray-600 ">
        <div class="w-full px-4 py-3 rounded-md" [class.bg-blue-50]="item.active">
            <span class="me-2">
                <span><i [class]="item.icon"></i></span>
            </span>

            <span>
                <span class="text-base" [class]="item.active ? 'font-medium' : 'font-semibold' ">{{item.label}}</span>
            </span>
        </div>
    </div>
</a>
