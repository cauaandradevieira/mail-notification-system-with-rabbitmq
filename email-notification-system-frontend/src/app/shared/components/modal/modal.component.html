<!-- modal.component.html -->
@if (showModal)
{
  <div class="fixed inset-0 flex items-center justify-center z-50">
    <div class="absolute inset-0 bg-gray-900 opacity-50" (click)="close()"></div>
    <div class="bg-white rounded-lg shadow-lg p-6 z-10 w-full max-w-md">
      <h2 class="text-xl font-semibold mb-4">{{ title }}</h2>
      <ng-content></ng-content>
      <button class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600" (click)="close()">Fechar</button>
    </div>
  </div>
}
